name: Build and Push to GHCR 

on: 
  push: 
    branches: ["main"] 

permissions: 
  contents: read 
  packages: write 
  
jobs: 
  build: 
    runs-on: ubuntu-latest 
    
    steps: 
    - name: Checkout repo 
      uses: actions/checkout@v4 
      
    - name: Login to GHCR 
      uses: docker/login-action@v3 
      with: 
        registry: ghcr.io 
        username: ${{ github.actor }} 
        password: ${{ secrets.GITHUB_TOKEN }} 
      
    - name: Build image 
      run: | 
        docker build -t ghcr.io/${{ github.repository_owner }}/gpa-app:latest . 
        
    - name: Push image 
      run: | 
        docker push ghcr.io/${{ github.repository_owner }}/gpa-app:latest